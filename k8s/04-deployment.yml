apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadequilibrium
  namespace: loadequilibrium
  labels:
    app.kubernetes.io/name: loadequilibrium
    app.kubernetes.io/version: latest
spec:
  replicas: 1   # singleton control-plane — do not scale >1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: loadequilibrium
  template:
    metadata:
      labels:
        app: loadequilibrium
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8080"
        prometheus.io/path:   "/metrics"
    spec:

      # ── Pod-level security context ──────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser:  10001
        runAsGroup: 10001
        fsGroup:    10001
        # Prevent privilege escalation at the kernel level
        seccompProfile:
          type: RuntimeDefault

      # ── Postgres readiness init container ───────────────────────────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-svc 5432; do sleep 2; done
          securityContext:
            runAsNonRoot:             true
            runAsUser:                65534
            readOnlyRootFilesystem:   true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

      containers:
        - name: loadequilibrium
          image: ghcr.io/your-org/loadequilibrium:latest
          imagePullPolicy: Always   # always pull on restart — prevents stale image reuse

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Non-secret config from ConfigMap
          envFrom:
            - configMapRef:
                name: loadequilibrium-config

          # Secrets injected individually — never via envFrom (would expose all secrets)
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: loadequilibrium-secrets
                  key: database-url

            - name: INGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: loadequilibrium-secrets
                  key: ingest-token

            # Separate control token: collectors use INGEST_TOKEN only.
            # Only operators (humans/CI) know CONTROL_TOKEN.
            - name: CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: loadequilibrium-secrets
                  key: control-token

            # Optional: set for internet-accessible dashboards
            - name: DASHBOARD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: loadequilibrium-secrets
                  key: dashboard-token
                  optional: true

          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "2000m"
              memory: "1Gi"

          # ── Container-level security context ─────────────────────────────────
          securityContext:
            runAsNonRoot:             true
            runAsUser:                10001
            readOnlyRootFilesystem:   true   # binary cannot modify itself
            allowPrivilegeEscalation: false  # cannot gain root after start
            capabilities:
              drop: [ALL]   # no Linux capabilities required by a Go HTTP server

          # Writable tmpfs for any in-process temp files (none currently needed)
          volumeMounts:
            - name: tmp
              mountPath: /tmp

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds:       10
            failureThreshold:    3
            timeoutSeconds:      5

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds:       5
            failureThreshold:    3
            timeoutSeconds:      3

          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]

      volumes:
        - name: tmp
          emptyDir:
            medium: Memory   # in-memory tmpfs, not disk
            sizeLimit: 64Mi

      restartPolicy: Always
      terminationGracePeriodSeconds: 30

      # ── Network policy note ─────────────────────────────────────────────────
      # Apply the NetworkPolicy in 08-networkpolicy.yml to restrict which pods
      # can reach the API. Without a NetworkPolicy, any pod in the cluster
      # can call the ingest and control endpoints.

---
apiVersion: v1
kind: Service
metadata:
  name: loadequilibrium-svc
  namespace: loadequilibrium
  labels:
    app.kubernetes.io/name: loadequilibrium
spec:
  selector:
    app: loadequilibrium
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP