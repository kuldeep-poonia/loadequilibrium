apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-le           # stable UID referenced by dashboard panels
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "2s"         # matches scrape_interval
      queryTimeout: "30s"