apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: loadequilibrium
  labels:
    app.kubernetes.io/name: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval:     2s
      evaluation_interval: 2s

    scrape_configs:
      - job_name: loadequilibrium
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [loadequilibrium]
        relabel_configs:
          # Only scrape pods with the annotation prometheus.io/scrape: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: loadequilibrium
  labels:
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus-sa
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}   # replace with PVC for durable storage

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: loadequilibrium
  labels:
    app.kubernetes.io/name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090

---
# RBAC: Prometheus needs read access to pod metadata for kubernetes_sd_configs
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: loadequilibrium

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-role
  namespace: loadequilibrium
rules:
  - apiGroups: [""]
    resources: [pods, endpoints, services]
    verbs: [get, list, watch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-rolebinding
  namespace: loadequilibrium
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: loadequilibrium
roleRef:
  kind: Role
  name: prometheus-role
  apiGroup: rbac.authorization.k8s.io