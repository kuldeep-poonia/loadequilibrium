apiVersion: 1

providers:
  - name: loadequilibrium
    orgId: 1
    type: file
    disableDeletion: true        # prevent accidental dashboard deletion via UI
    updateIntervalSeconds: 30
    allowUiUpdates: false        # dashboards are source-controlled, not edited live
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false