apiVersion: v1
kind: ConfigMap
metadata:
  name: loadequilibrium-config
  namespace: loadequilibrium
  labels:
    app.kubernetes.io/name: loadequilibrium
data:
  # ── Server 
  LISTEN_ADDR:            ":8080"

  # ── Control tick engine 
  TICK_INTERVAL:          "2s"
  TICK_DEADLINE:          "1800ms"
  MIN_TICK_INTERVAL:      "1s"
  MAX_TICK_INTERVAL:      "10s"
  TICK_ADAPT_STEP:        "1.25"

  # ── Telemetry ring buffers 
  RING_BUFFER_DEPTH:      "300"
  MAX_SERVICES:           "200"
  STALE_SERVICE_AGE:      "5m"
  WORKER_POOL_SIZE:       "8"

  # ── Simulation engine 
  SIM_BUDGET:             "45ms"
  SIM_HORIZON_MS:         "60000"
  SIM_SHOCK_FACTOR:       "2.0"
  SIM_ASYNC_BUFFER:       "4"
  SIM_STOCHASTIC_MODE:    "exponential"

  # ── Control policy 
  UTILISATION_SETPOINT:   "0.70"
  COLLAPSE_THRESHOLD:     "0.90"
  WINDOW_FRACTION:        "0.10"
  EWMA_FAST_ALPHA:        "0.30"
  EWMA_SLOW_ALPHA:        "0.10"
  SPIKE_Z_SCORE:          "3.0"

  # ── PID controller 
  PID_KP:                 "-1.5"
  PID_KI:                 "-0.3"
  PID_KD:                 "-0.1"
  PID_DEADBAND:           "0.02"
  PID_INTEGRAL_MAX:       "2.0"

  # ── Prediction & reasoning 
  ARRIVAL_ESTIMATOR_MODE:   "ewma"
  PREDICTIVE_HORIZON_TICKS: "5"
  MAX_REASONING_COOLDOWNS:  "500"
  SAFETY_MODE_THRESHOLD:    "3"
  STALENESS_BYPASS_THRESHOLD: "0.70"

  # ── SLA ───
  SLA_LATENCY_THRESHOLD_MS: "500.0"

  # ── Streaming 
  MAX_STREAM_CLIENTS:     "50"

  # ── Scenario mode (off in production) 
  SCENARIO_MODE:          "off"

  # ── Persistence 
  PERSIST_INTERVAL:       "30s"