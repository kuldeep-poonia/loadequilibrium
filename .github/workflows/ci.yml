name: CI

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION:    "1.22"
  REGISTRY:      ghcr.io
  IMAGE_NAME:    ${{ github.repository }}   # e.g. your-org/loadequilibrium

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

  # ── 2. Unit & integration tests ───────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests (race detector)
        run: |
          go test \
            -race \
            -count=1 \
            -timeout=300s \
            -coverprofile=coverage.out \
            ./internal/...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ── 3. System tests ───────────────────────────────────────────
  system-test:
    name: System Tests (Autopilot)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build system test runner
        run: go build -o system_test_runner ./cmd/system_test_runner/

      - name: Run system tests
        run: |
          ./system_test_runner 2>/dev/null

          VERDICT=$(jq -r '.global_summary.overall_system_verdict' system_test_report.json)
          READY=$(jq -r '.global_summary.production_ready_count' system_test_report.json)
          TOTAL=$(jq '.scenarios | length' system_test_report.json)
          SLA=$(jq -r '.global_summary.total_sla_breaches' system_test_report.json)

          echo "Verdict : $VERDICT"
          echo "Ready   : $READY / $TOTAL"
          echo "SLA     : $SLA breaches"

          if [ "$VERDICT" != "STABLE_PRODUCTION_GRADE" ]; then
            echo "FAIL: verdict is $VERDICT"
            exit 1
          fi
          if [ "$READY" != "$TOTAL" ]; then
            echo "FAIL: only $READY/$TOTAL scenarios production-ready"
            exit 1
          fi
          if [ "$SLA" != "0" ]; then
            echo "FAIL: $SLA SLA breaches"
            exit 1
          fi

      - name: Print per-scenario summary on failure
        if: failure()
        run: |
          jq -r '
            .scenarios[] |
            "  \(.scenario): ready=\(.summary.production_ready) sla=\(.summary.sla_breaches)"
          ' system_test_report.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: system-test-report
          path: system_test_report.json
          retention-days: 30

  # ── 4. Build & push Docker image ─────────────────────────────
  # Builds the single unified image (backend + UI + embedded collector).
  # Pushes to ghcr.io on: main branch commits, and version tags (v*.*.*).
  # Pull requests get a build-only check (no push).
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [unit-test, system-test]
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags:
      #   main branch  → ghcr.io/your-org/loadequilibrium:latest
      #   v1.2.3 tag   → ghcr.io/your-org/loadequilibrium:1.2.3
      #                   ghcr.io/your-org/loadequilibrium:1.2
      #                   ghcr.io/your-org/loadequilibrium:1
      #                   ghcr.io/your-org/loadequilibrium:latest
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          # Multi-platform: builds for both x86_64 and ARM (Apple Silicon, Raspberry Pi, AWS Graviton)
          platforms: linux/amd64,linux/arm64