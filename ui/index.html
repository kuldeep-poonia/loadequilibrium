<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoadEquilibrium</title>
  <!--
    Fonts are loaded from Google Fonts CDN.
    If your environment has no internet access (air-gapped), the UI still works
    but falls back to system monospace/sans-serif fonts.
    To fully self-host, run: npx fontsource-cli add jetbrains-mono barlow-condensed
    and replace this block with: import '@fontsource/jetbrains-mono' in main.jsx
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-bg">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
