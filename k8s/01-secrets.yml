## ══════════════════════════════════════════════════════════════════════════════
## LoadEquilibrium — k8s/01-secrets.yml
##
## IMPORTANT: The base64 values below are EXAMPLES ONLY.
## They decode to the word "changeme" and MUST be replaced before deploying.
##
## HOW TO SET REAL SECRETS (never put real values in this file):
##
##   # 1. Generate real tokens
##   INGEST_TOKEN=$(openssl rand -hex 32)
##   CONTROL_TOKEN=$(openssl rand -hex 32)   # must differ from INGEST_TOKEN
##   DASHBOARD_TOKEN=$(openssl rand -hex 32)
##   DB_PASS=$(openssl rand -hex 32)
##
##   # 2. Create the Kubernetes secret imperatively (not from this file)
##   kubectl create secret generic loadequilibrium-secrets \
##     --from-literal=ingest-token="$INGEST_TOKEN" \
##     --from-literal=control-token="$CONTROL_TOKEN" \
##     --from-literal=dashboard-token="$DASHBOARD_TOKEN" \
##     --from-literal=database-url="postgres://le:${DB_PASS}@postgres-svc:5432/le?sslmode=require" \
##     -n loadequilibrium
##
##   kubectl create secret generic postgres-secrets \
##     --from-literal=postgres-user="le" \
##     --from-literal=postgres-password="$DB_PASS" \
##     --from-literal=postgres-db="le" \
##     -n loadequilibrium
##
## RECOMMENDED: Use an external secrets manager instead of Kubernetes Secrets:
##   - AWS Secrets Manager + External Secrets Operator
##   - HashiCorp Vault + Vault Agent Injector
##   - Sealed Secrets (Bitnami) for GitOps workflows
##
## This file exists only as a structural reference. The `kubectl apply` in CI
## should reference real secrets from your secrets manager, not this file.
## ══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Secret
metadata:
  name: loadequilibrium-secrets
  namespace: loadequilibrium
  labels:
    app.kubernetes.io/name: loadequilibrium
  annotations:
    # Reminder: rotate all tokens by patching this secret, then rolling the Deployment.
    # kubectl patch secret loadequilibrium-secrets -p '{"data":{"ingest-token":"<new-base64>"}}'
    # kubectl rollout restart deployment/loadequilibrium -n loadequilibrium
    security.loadequilibrium.io/rotation-reminder: "Rotate every 90 days"
type: Opaque
data:
  # REPLACE ALL VALUES BELOW — these are placeholder strings that must not be used in production.
  # Use: echo -n "your-real-token" | base64
  ingest-token:    UkVQTEFDRV9XSVRIXzMyX0JZVEVfUkFORE9NX1RPS0VO    # REPLACE
  control-token:   UkVQTEFDRV9XSVRIXzMyX0JZVEVfUkFORE9NX1RPS0VO    # REPLACE (different from ingest-token)
  dashboard-token: ""                                                  # optional — set for internet-facing dashboards
  database-url:    UkVQTEFDRV9XSVRIXzMyX0JZVEVfUkFORE9NX1RPS0VO    # REPLACE

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: loadequilibrium
  labels:
    app.kubernetes.io/name: postgres
type: Opaque
data:
  postgres-user:     bGU=                                             # "le" — safe to keep
  postgres-password: UkVQTEFDRV9XSVRIXzMyX0JZVEVfUkFORE9NX1RPS0VO # REPLACE
  postgres-db:       bGU=                                             # "le" — safe to keep