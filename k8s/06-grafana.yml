apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: loadequilibrium
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus-le
        url: http://prometheus-svc:9090
        access: proxy
        isDefault: true
        editable: false
        jsonData:
          httpMethod: POST
          timeInterval: "2s"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: loadequilibrium
data:
  provider.yml: |
    apiVersion: 1
    providers:
      - name: loadequilibrium
        orgId: 1
        type: file
        disableDeletion: true
        updateIntervalSeconds: 30
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards

---
# Dashboard JSON is stored as a ConfigMap so it's version-controlled.
# For large dashboards, consider mounting via a volume or using Grafana's API.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: loadequilibrium
data:
  loadequilibrium.json: |
    {
      "title": "loadequilibrium — Autopilot",
      "uid": "loadequilibrium-autopilot",
      "schemaVersion": 39,
      "refresh": "5s",
      "panels": [],
      "time": { "from": "now-15m", "to": "now" }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: loadequilibrium
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472    # grafana GID
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: loadequilibrium-secrets
                  key: ingest-token    # reuse or add a dedicated grafana-password secret
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/loadequilibrium.json
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-json
              mountPath: /var/lib/grafana/dashboards
            - name: grafana-data
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: datasource
          configMap:
            name: grafana-datasource
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-json
          configMap:
            name: grafana-dashboard-json
        - name: grafana-data
          emptyDir: {}   # replace with PVC if you need persistent dashboards

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: loadequilibrium
  labels:
    app.kubernetes.io/name: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: web
      port: 3000
      targetPort: 3000