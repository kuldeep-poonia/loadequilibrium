

services:

  

  loadequilibrium:
    image: ghcr.io/your-org/loadequilibrium:latest
    # To build locally instead:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    ports:
      - "${LE_PORT:-8080}:8080"
    volumes:
      # Docker socket — required for auto-discovery of your services
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN_ADDR: ":8080"

      # ── Security ───
      # Token required on all POST /api/v1/ingest calls.
      # Leave empty to disable auth (fine for private networks).
      INGEST_TOKEN: "${INGEST_TOKEN:-}"

      # ── Persistence (optional) 
      # Without DATABASE_URL the engine runs fully in-memory.
      # Data is lost on restart but the system works perfectly.
      # To enable: set DATABASE_URL=postgres://user:pass@host:5432/db
      DATABASE_URL: "${DATABASE_URL:-}"

      # ── Tuning (all optional — defaults are sensible) 
      TICK_INTERVAL:         "${TICK_INTERVAL:-2s}"
      UTILISATION_SETPOINT:  "${UTILISATION_SETPOINT:-0.70}"
      COLLAPSE_THRESHOLD:    "${COLLAPSE_THRESHOLD:-0.90}"
      MAX_SERVICES:          "${MAX_SERVICES:-200}"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 15s
    restart: unless-stopped

