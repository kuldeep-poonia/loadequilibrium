# ─────────────────────────────────────────────────────────────────────────────
# SECRETS
# Do NOT commit real values. Populate via CI/CD or external secrets operator:
#
#   kubectl create secret generic loadequilibrium-secrets \
#     --from-literal=database-url='postgres://le:PASS@postgres-svc:5432/le?sslmode=require' \
#     --from-literal=ingest-token='your-real-token' \
#     -n loadequilibrium
#
# The values below are base64-encoded PLACEHOLDERS only.
# echo -n 'changeme' | base64  →  Y2hhbmdlbWU=
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: loadequilibrium-secrets
  namespace: loadequilibrium
  labels:
    app.kubernetes.io/name: loadequilibrium
type: Opaque
data:
  database-url: cG9zdGdyZXM6Ly9sZTpjaGFuZ2VtZUBwb3N0Z3Jlcy1zdmM6NTQzMi9sZT9zc2xtb2RlPXJlcXVpcmU=
  ingest-token: Y2hhbmdlbWU=

---
# PostgreSQL credentials (consumed by the postgres StatefulSet)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: loadequilibrium
  labels:
    app.kubernetes.io/name: postgres
type: Opaque
data:
  postgres-user: bGU=         # le
  postgres-password: Y2hhbmdlbWU=   # changeme — override before deploying
  postgres-db: bGU=           # le